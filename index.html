<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Board Game Screen</title>
    <!-- Links your external style sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Role Banner & Villainess Curse Setup -->
    <div id="roleIndicator" class="role-banner hero-role">Role: Hero (Player 1)</div>

    <h1>Hero's Trial</h1>
    
    <div class="container">
        <!-- HP, Curse and Attack Section -->
        <div class="box">
            <h2>Match HP Status</h2>
            <div>Remaining HP / Starting HP</div>
            <div class="hp-display"><span id="remHp">--</span> / <span id="startHp">--</span></div>
    <!-- Villainess D20 Curse Setup Control Area -->
    <div id="villainSetup" class="villain-setup-container" style="display: none;">
        <div class="curse-label">Roll for Curse:</div>
        <div id="vDiceElement" class="v-dice" onclick="rollCurseDice()">d20</div>
    </div>
            
            <!-- NEW: Thematic Curse Element -->
            <div id="curseDisplayBox" class="curse-badge">
                <span class="curse-icon">🔮</span> Curse Modifier: +<span id="curseValue">0</span>
            </div>
            
            <!-- Hero Interactive Group -->
            <div class="hero-control">
                <h3>Submit Attack Score</h3>
                <div class="attack-area">
                    <input type="number" id="scoreInput" placeholder="Base damage">
                    
                    <!-- Dynamic Bonus Dice Box -->
                    <div id="bonusBox" class="bonus-container">
                        <div class="bonus-label">10! Bonus:</div>
                        <div id="diceElement" class="dice" onclick="rollBonusDice()">?</div>
                    </div>

                    <button onclick="submitScore()">Submit Attack</button>
                </div>
            </div>
        </div>

        <!-- Spinners Section -->
        <div class="box">
            <h2>Game Spinners</h2>
            <p>Content Category: <strong id="spin1Val" style="color:#00d2d3">None</strong></p>
            <p>Parameters: <strong id="spin2Val" style="color:#00d2d3">None</strong></p>
            
            <!-- Hero Interactive Group -->
            <button class="hero-control" onclick="spinWheels()">Spin Both Wheels</button>
        </div>
    </div>

    <!-- Interactive Visual Round Boxes Container -->
    <h3>Match Progress</h3>
    <div id="roundGrid" class="round-grid"></div>

    <!-- Hero Interactive Group -->
    <button id="resetBtn" class="btn-danger hero-control" onclick="confirmReset()">🔄 Reset Entire Game</button>

    <!-- Game Over Screen Overlay Element Structure -->
    <div id="gameOverOverlay" class="game-over-overlay">
        <div id="gameOverBox" class="game-over-box">
            <div id="gameOverTitle" class="game-over-title">Victory!</div>
            <div id="gameOverMsg" class="game-over-msg">Message goes here.</div>
            <button id="overlayResetBtn" class="btn-danger hero-control" onclick="confirmReset()">🔄 Clear & Start New Match</button>
        </div>
    </div>

    <!-- Links your external JavaScript game engine -->
    <script src="game.js"></script>
</body>
</html>
